services:
  product-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: product_db
    ports:
      - "3307:3306"
    volumes:
      - product-db-data:/var/lib/mysql

  order-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: order_db
    ports:
      - "3308:3306"
    volumes:
      - order-db-data:/var/lib/mysql

volumes:
  product-db-data:
  order-db-data: